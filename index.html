<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Document</title>
  </head>
  <body>
    <h1
      class="text-center text-xl md:text-2xl text-green-500 py-5 sticky top-0 bg-[#fcfbfb] z-2 font-bold shadow-lg"
    >
      Choose Your Trees
    </h1>
    <main class="container mx-auto">
      <section class="grid grid-cols-12 gap-5 p-5 shadow-lg">
        <!-- categories -->
        <div
          id="categories-container"
          class="left col-span-3 space-y-3 sticky top-14 h-fit max-h-[calc(100vh-120px)] overflow-y-auto bg-[white] p-3 rounded-lg shadow-lg"
        >
          <h1 class="text-lg font-bold text-center">Categories</h1>
          <button id="all-btn" class="btn btn-success w-full rounded">
            all
          </button>
        </div>
        <!-- Trees container -->
        <div class="col-span-6 bg-gray-50 p-5 rounded-lg hadow-xl">
          <div
            id="trees-container"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"
          ></div>
          <!-- loading spinner -->
          <div
            id="loadingSpinner"
            class="h-[60vh] flex items-center justify-center hidden"
          >
            <span class="loading loading-dots loading-xl"></span>
          </div>
        </div>
        <div
          class="right col-span-3 bg-gray-100 p-4 shadow-lg  sticky top-14 h-fit max-h-[calc(100vh-120px)] overflow-y-auto"
        >
          <div class="flex items-center mb-5">
            <i class="fa-solid fa-cart-shopping"></i>
            <h1 class="font-bold">card</h1>
          </div>
          <div id="cardContainer" class="space-y-4 ">
            <div id="emptyMessege" class="text-center border border-red-500 shadow p-2 rounded-xl ">
              <h1 class="text-red-500 animate-bounce font-bold">No Card</h1>
              <p class="text-yellow-500 font-semibold animate-pulse">Pleas Add  Your Card</p>
            </div>
            
          </div>

          <div
            class="flex font-bold mt-4 bg-green-200 p-2 rounded-lg shadow-lg items-center justify-center"
          >
            <span>Total: $</span>
            <span id="totalPrice">0</span>
          </div>
        </div>
      </section>

      <!-- product details modal -->
      <!-- Open the modal using ID.showModal() method -->
      <dialog id="tree_details" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <img
            class="h-48 w-full object-cover cursor-pointer rounded-lg"
            id="modal-img"
            src=""
            alt=""
          />
          <div class="modal-modal-action">
            <h3 id="modal-title" class="text-2xl font-bold"></h3>
            <p id="description" class="py-4"></p>
            <p
              id="modal-category"
              class="badge badge-success badge-outline"
            ></p>
            <form method="dialog" class="flex justify-between mt-5">
              <p class="text-2xl font-bold text-green-500">
                <span>$</span><span id="modal-price"></span>
              </p>
              <!-- if there is a button in form, it will close the modal -->
              <button class="btn">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>

    <script src="script.js"></script>
  </body>
</html>
